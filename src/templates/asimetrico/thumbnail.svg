<svg viewBox="0 0 110 155" fill="none" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; border-radius:4px; width:100%; height:100%;">
  <!-- Page Background (Light gray) -->
  <rect x="0" y="0" width="110" height="155" fill="#efefef" />

  <!-- Top Band (Dark charcoal on the right) -->
  <rect x="39" y="0" width="71" height="46" fill="var(--preview-primary, #111316)" />

  <!-- Photo Box (Left side overlapping the band) -->
  <rect x="6" y="6" width="50" height="54" fill="#ffffff" stroke="#ffffff" stroke-width="1.5" />
  
  <!-- Header text lines inside top band -->
  <rect x="62" y="10" width="22" height="4" rx="0.5" fill="#ffffff" opacity="0.8" />
  <rect x="62" y="16" width="28" height="5" rx="0.5" fill="#ffffff" />
  <rect x="62" y="24" width="34" height="3" rx="0.5" fill="var(--preview-accent, #c9a227)" />
  
  <!-- Mini contact info lines in header -->
  <rect x="62" y="30" width="24" height="2" rx="0.3" fill="#ffffff" opacity="0.6" />
  <rect x="62" y="34" width="28" height="2" rx="0.3" fill="#ffffff" opacity="0.6" />
  <rect x="62" y="38" width="20" height="2" rx="0.3" fill="#ffffff" opacity="0.6" />

  <!-- Left Column -->
  <!-- Section Title: Education -->
  <rect x="6" y="66" width="22" height="4" rx="0.5" fill="var(--preview-primary, #111316)" />
  <!-- Education Item -->
  <rect x="6" y="74" width="36" height="2.5" rx="0.3" fill="#4a4a4a" />
  <rect x="6" y="78" width="40" height="2" rx="0.3" fill="#888888" />
  <rect x="6" y="81" width="32" height="1.5" rx="0.3" fill="#9f9f9f" />

  <!-- Section Title: Skills -->
  <rect x="6" y="89" width="16" height="4" rx="0.5" fill="var(--preview-primary, #111316)" />
  <!-- Skill items -->
  <rect x="6" y="97" width="26" height="2" rx="0.3" fill="#4a4a4a" />
  <rect x="36" y="97" width="12" height="2" rx="0.3" fill="var(--preview-accent, #c9a227)" />
  
  <rect x="6" y="101" width="28" height="2" rx="0.3" fill="#4a4a4a" />
  <rect x="36" y="101" width="10" height="2" rx="0.3" fill="var(--preview-accent, #c9a227)" />

  <rect x="6" y="105" width="22" height="2" rx="0.3" fill="#4a4a4a" />
  <rect x="36" y="105" width="8" height="2" rx="0.3" fill="var(--preview-accent, #c9a227)" />

  <!-- Right Column -->
  <!-- Section Title: Experience -->
  <rect x="58" y="52" width="26" height="4" rx="0.5" fill="var(--preview-primary, #111316)" />
  <!-- Experience Item 1 -->
  <rect x="58" y="60" width="34" height="2.5" rx="0.3" fill="#222222" />
  <rect x="58" y="64" width="38" height="2" rx="0.3" fill="#666666" />
  
  <!-- Line and bullet -->
  <line x1="58.5" y1="69" x2="58.5" y2="82" stroke="#9f9f9f" stroke-width="0.8" />
  <rect x="62" y="69" width="36" height="1.5" rx="0.3" fill="#888888" />
  <rect x="62" y="72" width="32" height="1.5" rx="0.3" fill="#888888" />
  <rect x="62" y="75" width="24" height="1.5" rx="0.3" fill="#888888" />
  <!-- Certificate button -->
  <rect x="62" y="79" width="18" height="4" rx="0.5" fill="var(--preview-accent, #c9a227)" />

  <!-- Experience Item 2 -->
  <rect x="58" y="87" width="32" height="2.5" rx="0.3" fill="#222222" />
  <rect x="58" y="91" width="36" height="2" rx="0.3" fill="#666666" />
  <line x1="58.5" y1="95" x2="58.5" y2="104" stroke="#9f9f9f" stroke-width="0.8" />
  <rect x="62" y="95" width="34" height="1.5" rx="0.3" fill="#888888" />
  <rect x="62" y="98" width="30" height="1.5" rx="0.3" fill="#888888" />

  <!-- Section Title: Languages -->
  <rect x="58" y="109" width="20" height="4" rx="0.5" fill="var(--preview-primary, #111316)" />
  <!-- Language bars -->
  <rect x="58" y="117" width="16" height="2" rx="0.3" fill="#4a4a4a" />
  <rect x="58" y="120" width="40" height="2" rx="0.5" fill="#dddddd" />
  <rect x="58" y="120" width="32" height="2" rx="0.5" fill="var(--preview-accent, #c9a227)" />

  <rect x="58" y="125" width="14" height="2" rx="0.3" fill="#4a4a4a" />
  <rect x="58" y="128" width="40" height="2" rx="0.5" fill="#dddddd" />
  <rect x="58" y="128" width="24" height="2" rx="0.5" fill="var(--preview-accent, #c9a227)" />
</svg>
